<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MachinaRWA Operator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #fafafa; }
    .mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body class="text-zinc-900 antialiased min-h-screen flex flex-col">

  <!-- Top Navigation -->
  <header class="bg-white border-b border-zinc-200 px-6 py-4">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-6 h-6 bg-indigo-600 rounded-md"></div>
        <h1 class="text-lg font-semibold tracking-tight text-zinc-900">MachinaRWA</h1>
      </div>
      <div class="flex items-center gap-2 px-3 py-1 bg-emerald-50 border border-emerald-200 rounded-full">
        <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
        <span class="text-xs font-medium text-emerald-700">Testnet Gateway Online</span>
      </div>
    </div>
  </header>

  <main class="flex-1 w-full max-w-6xl mx-auto p-6 md:py-10 grid grid-cols-1 lg:grid-cols-12 gap-8">
    
    <!-- Left Column: Telemetry & Identity -->
    <div class="lg:col-span-4 space-y-6">
      
      <!-- Revenue Card -->
      <div class="bg-white border border-zinc-200 rounded-xl p-6 shadow-sm">
        <h2 class="text-sm font-medium text-zinc-500 mb-4">Total Accumulated Revenue</h2>
        <div class="flex items-baseline gap-2">
          <span id="metric-revenue" class="text-4xl font-semibold tracking-tight text-zinc-900">0.000</span>
          <span class="text-sm font-medium text-zinc-500">CSPR</span>
        </div>
      </div>

      <!-- Device Metrics -->
      <div class="bg-white border border-zinc-200 rounded-xl p-0 shadow-sm overflow-hidden">
        <div class="px-6 py-4 border-b border-zinc-100">
          <h2 class="text-sm font-medium text-zinc-900">Device Telemetry</h2>
        </div>
        <div class="divide-y divide-zinc-100">
          <div class="px-6 py-4 flex justify-between items-center">
            <span class="text-sm text-zinc-500">Completed Inferences</span>
            <span id="metric-jobs" class="text-sm font-medium mono text-zinc-900">0</span>
          </div>
          <div class="px-6 py-4 flex justify-between items-center">
            <span class="text-sm text-zinc-500">Hardware Temp</span>
            <span class="text-sm font-medium mono text-zinc-900"><span id="metric-temp">--</span>°C</span>
          </div>
          <div class="px-6 py-4 flex justify-between items-center">
            <span class="text-sm text-zinc-500">Uptime</span>
            <span id="metric-uptime" class="text-sm font-medium mono text-zinc-900">0s</span>
          </div>
        </div>
      </div>

      <!-- Identity Card -->
      <div class="bg-zinc-50 border border-zinc-200 rounded-xl p-6 shadow-sm">
        <h2 class="text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-3">On-Chain Identity</h2>
        <div class="break-all">
          <code id="agent-key" class="text-xs text-indigo-600 mono bg-indigo-50 px-2 py-1 rounded">Loading...</code>
        </div>
      </div>
    </div>

    <!-- Right Column: Simulator & Logs -->
    <div class="lg:col-span-8 flex flex-col gap-6">
      
      <!-- x402 Simulator -->
      <div class="bg-white border border-zinc-200 rounded-xl p-6 shadow-sm">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-base font-semibold tracking-tight text-zinc-900">x402 Micropayment Client Simulator</h2>
          <span class="text-xs font-medium mono bg-zinc-100 text-zinc-600 px-2 py-1 rounded">POST /api/compute</span>
        </div>

        <div class="space-y-5">
          <div>
            <label class="block text-sm font-medium text-zinc-700 mb-1.5">x-payment-proof <span class="text-zinc-400 font-normal">(Deploy Hash)</span></label>
            <div class="flex">
              <input type="text" id="sim-proof" class="flex-1 bg-white border border-zinc-300 rounded-l-lg px-3 py-2 text-sm mono focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none" readonly>
              <button onclick="generateMockProof()" class="bg-zinc-50 hover:bg-zinc-100 border-y border-r border-zinc-300 text-zinc-600 px-4 py-2 rounded-r-lg text-sm font-medium transition-colors">Regenerate</button>
            </div>
          </div>
          
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-zinc-700 mb-1.5">x-payment-amount <span class="text-zinc-400 font-normal">(Motes)</span></label>
              <input type="number" id="sim-amount" value="1000000000" class="w-full bg-white border border-zinc-300 rounded-lg px-3 py-2 text-sm mono focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none">
            </div>
            <div>
              <label class="block text-sm font-medium text-zinc-700 mb-1.5">Network Fee</label>
              <div class="w-full bg-zinc-50 border border-zinc-200 rounded-lg px-3 py-2 text-sm text-zinc-500">1 CSPR</div>
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-zinc-700 mb-1.5">RWA Inference Payload</label>
            <textarea id="sim-payload" rows="3" class="w-full bg-white border border-zinc-300 rounded-lg px-3 py-3 text-sm focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none resize-none">Asset ID: RE-LAG-092. Type: Commercial Real Estate. Location: Victoria Island, Lagos. Current Valuation: $1.2M USD. Verified Annual Rental Yield: 8.4%. Requesting risk level classification for fractional tokenization.</textarea>
          </div>

          <div class="pt-2 flex gap-3">
            <button id="btn-submit" onclick="submitComputeJob()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-6 rounded-lg transition-colors flex items-center justify-center gap-2">
              <span class="btn-text">Submit Inference</span>
            </button>
            <button onclick="clearConsole()" class="bg-white border border-zinc-200 hover:bg-zinc-50 text-zinc-700 font-medium py-2 px-6 rounded-lg transition-colors">Clear Logs</button>
          </div>
        </div>
      </div>

      <!-- Terminal Output -->
      <div class="bg-white border border-zinc-200 rounded-xl flex flex-col flex-1 shadow-sm overflow-hidden min-h-[300px]">
        <div class="bg-zinc-50 px-4 py-2 border-b border-zinc-200 flex items-center justify-between">
          <span class="text-xs font-semibold text-zinc-500 uppercase tracking-wider">Gateway Logs</span>
        </div>
        <div class="p-4 bg-white flex-1 overflow-y-auto font-mono text-sm" id="terminal">
          <div class="text-zinc-400">Initializing telemetry stream...</div>
        </div>
      </div>

    </div>
  </main>

  <script>
    const term = document.getElementById('terminal');
    
    function logToTerminal(msg, type = 'info') {
      const el = document.createElement('div');
      const time = new Date().toISOString().split('T')[1].split('.')[0];
      
      let colorClass = 'text-zinc-600';
      if (type === 'error') colorClass = 'text-red-600 font-medium';
      if (type === 'success') colorClass = 'text-indigo-600 font-medium';
      if (type === 'guardrail') colorClass = 'text-amber-600 font-medium';
      if (type === 'json') colorClass = 'text-zinc-500 whitespace-pre-wrap mt-1 pl-4 border-l-2 border-zinc-200 text-xs';
      
      el.className = `${colorClass} py-1`;
      el.innerHTML = type === 'json' ? msg : `<span class="text-zinc-400 mr-2">[${time}]</span>${msg}`;
      term.appendChild(el);
      term.scrollTop = term.scrollHeight;
    }

    function clearConsole() {
      term.innerHTML = '<div class="text-zinc-400">Logs cleared.</div>';
    }

    function generateMockProof() {
      const chars = '0123456789abcdef';
      let hash = '';
      for (let i = 0; i < 64; i++) hash += chars[Math.floor(Math.random() * 16)];
      document.getElementById('sim-proof').value = hash;
    }

    async function fetchStatus() {
      try {
        const res = await fetch('/status');
        const data = await res.json();
        
        document.getElementById('metric-revenue').innerText = data.metrics.accumulated_revenue_cspr.toFixed(3);
        document.getElementById('metric-jobs').innerText = data.metrics.completed_jobs;
        document.getElementById('metric-temp').innerText = data.metrics.cpu_temperature;
        document.getElementById('metric-uptime').innerText = data.metrics.uptime_seconds + 's';
        document.getElementById('agent-key').innerText = data.machineId;
      } catch (e) {
        console.error('Telemetry failed:', e);
      }
    }

    async function submitComputeJob() {
      const btn = document.getElementById('btn-submit');
      const text = btn.querySelector('.btn-text');
      
      const proof = document.getElementById('sim-proof').value;
      const amount = document.getElementById('sim-amount').value;
      const payload = document.getElementById('sim-payload').value;

      btn.disabled = true;
      text.innerText = 'Processing...';

      logToTerminal(`POST /api/compute (Amount: ${amount} motes)`, 'info');

      try {
        const res = await fetch('/api/compute', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-payment-proof': proof,
            'x-payment-amount': amount
          },
          body: JSON.stringify({ jobInput: payload })
        });

        const data = await res.json();
        
        if (res.ok && data.success) {
          logToTerminal(`COMPLETED. Risk Level: ${data.agent_reasoning?.risk_level}`, 'success');
          logToTerminal(JSON.stringify(data.agent_reasoning, null, 2), 'json');
          generateMockProof(); 
        } else if (res.ok && !data.success && data.status === 'HALTED') {
          logToTerminal(`HALTED: ${data.reason}`, 'guardrail');
          logToTerminal(JSON.stringify(data.agent_reasoning, null, 2), 'json');
        } else {
          logToTerminal(`HTTP ${res.status}: ${data.error || 'Request Failed'} - ${data.message || ''}`, 'error');
        }
        
        fetchStatus();
      } catch (e) {
        logToTerminal(`Network Error: ${e.message}`, 'error');
      } finally {
        btn.disabled = false;
        text.innerText = 'Submit Inference';
      }
    }

    generateMockProof();
    fetchStatus();
    setInterval(fetchStatus, 2000);
  </script>
</body>
</html>
